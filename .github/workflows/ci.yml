name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: instalar requirements
        run: pip install -r requirements.txt
      - name: criar pasta models
        run: mkdir -p models
      - name: treinar o modelo
        run: python src/train.py
      - name: instalar requirements-test
        run: pip install -r requirements-test.txt
      - name: rodar pytest
        run: pytest
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: instalar requirements
        run: pip install -r requirements.txt
      - name: criar pasta models
        run: mkdir -p models
      - name: treinar o modelo
        run: python src/train.py
      - name: setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: docker build sem push
        run: docker build -t my-model .

  push:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: instalar requirements
        run: pip install -r requirements.txt
      - name: criar pasta models
        run: mkdir -p models
      - name: treinar o modelo
        run: python src/train.py
      - name: login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build e push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ml-model:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ml-model:${{ github.sha }}